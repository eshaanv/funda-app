name: Deploy Cloud Run (main)

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  infra:
    name: infra-prod
    runs-on: ubuntu-latest
    environment: production
    env:
      PROJECT_ID: ${{ vars.GOOGLE_CLOUD_PROJECT }}
      GCP_SERVICE_ACCOUNT_EMAIL: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      TERRAFORM_STATE_BUCKET: ${{ vars.TERRAFORM_STATE_BUCKET }}
      TERRAFORM_STATE_PREFIX: ${{ vars.TERRAFORM_STATE_PREFIX }}
      GITHUB_TOKEN: ${{ secrets.GH_TERRAFORM_TOKEN }}
      TF_IN_AUTOMATION: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate infra config
        shell: bash
        run: |
          required_vars=(
            PROJECT_ID
            GCP_SERVICE_ACCOUNT_EMAIL
            GCP_WORKLOAD_IDENTITY_PROVIDER
            TERRAFORM_STATE_BUCKET
            TERRAFORM_STATE_PREFIX
            GITHUB_TOKEN
          )

          for name in "${required_vars[@]}"; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not set"
              exit 1
            fi
          done

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}
          create_credentials_file: true

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform -chdir=infra fmt -check -recursive

      - name: Terraform init
        working-directory: infra/environments/prod
        run: |
          terraform init -input=false \
            -backend-config="bucket=${TERRAFORM_STATE_BUCKET}" \
            -backend-config="prefix=${TERRAFORM_STATE_PREFIX}"

      - name: Terraform validate
        working-directory: infra/environments/prod
        run: terraform validate

      - name: Terraform plan
        working-directory: infra/environments/prod
        run: terraform plan -input=false -var-file=github-actions.tfvars.hcl -out=tfplan

      - name: Terraform apply
        working-directory: infra/environments/prod
        run: terraform apply -input=false -auto-approve tfplan

  deploy:
    name: deploy-prod
    needs: infra
    runs-on: ubuntu-latest
    environment: production
    env:
      PROJECT_ID: ${{ vars.GOOGLE_CLOUD_PROJECT }}
      REGION: ${{ vars.CLOUD_RUN_LOCATION }}
      SERVICE_NAME: ${{ vars.CLOUD_RUN_SERVICE_NAME }}
      IMAGE: ${{ vars.CLOUD_RUN_LOCATION }}-docker.pkg.dev/${{ vars.GOOGLE_CLOUD_PROJECT }}/${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}/${{ vars.CLOUD_RUN_SERVICE_NAME }}:${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy config
        shell: bash
        env:
          ARTIFACT_REGISTRY_REPOSITORY: ${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}
          GCP_SERVICE_ACCOUNT_EMAIL: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        run: |
          required_vars=(
            PROJECT_ID
            REGION
            SERVICE_NAME
            ARTIFACT_REGISTRY_REPOSITORY
            GCP_SERVICE_ACCOUNT_EMAIL
            GCP_WORKLOAD_IDENTITY_PROVIDER
          )

          for name in "${required_vars[@]}"; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not set"
              exit 1
            fi
          done

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}
          create_credentials_file: true

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Artifact Registry auth
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build, push, and deploy
        env:
          CLOUDSDK_CORE_DISABLE_PROMPTS: "1"
        run: make deploy
